site_name: Prompting Cookbook
site_description: Prompt recipes, examples, and context-engineering guidance for teaching workflows.
site_url: https://rianders.github.io/prompting-cookbook/

docs_dir: docs
site_dir: site

exclude_docs: |
  .DS_Store
  assets/.DS_Store

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
    - content.action.view
    - toc.follow
  palette:
    - scheme: default
      primary: blue grey
      accent: blue

repo_name: rianders/prompting-cookbook
repo_url: https://github.com/rianders/prompting-cookbook
edit_uri: edit/main/

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

nav:
  - Home: index.md
  - Front Door:
      - Start Here: START-HERE.md
      - Choose Your Task: CHOOSE-YOUR-TASK.md
